services:
  php-fpm:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: support_php
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
      - ./docker/php/www.conf:/usr/local/etc/php-fpm.d/www.conf
    environment:
      PHP_IDE_CONFIG: "serverName=Docker"
    networks:
      - support
      - proxy-tier
    depends_on:
      - postgres
      - redis

  nginx:
    image: nginx:1.27-alpine
    container_name: support_nginx
    restart: unless-stopped
    expose:
      - "${PORT:-8086}:3000"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - support
      - proxy-tier
    depends_on:
      - php-fpm

  postgres:
    image: postgres:16-alpine
    container_name: support_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: inteteam_support
      POSTGRES_USER: support
      POSTGRES_PASSWORD: ${DB_PASSWORD:-SupportDevPass}
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - support

  redis:
    image: redis:7-alpine
    container_name: support_redis
    restart: unless-stopped
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    networks:
      - support
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-RedisDevPass}

  queue-worker:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: support_queue
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    networks:
      - support
    depends_on:
      - php-fpm
      - redis

  # Laravel Reverb WebSocket server
  reverb:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: support_reverb
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    command: php artisan reverb:start --host=0.0.0.0 --port=8080 --no-interaction
    expose:
      - "8080"
    networks:
      - support
    depends_on:
      - php-fpm
      - redis

  # Node / Vite HMR — DEV ONLY
  npm:
    image: node:22-alpine
    container_name: support_npm
    working_dir: /var/www
    profiles:
      - dev
    volumes:
      - ./:/var/www
    ports:
      - "5173:5173"
    networks:
      - support
    command: sh -c "npm install && npm run dev -- --host"

  # Mailpit — DEV ONLY
  mailpit:
    image: axllent/mailpit:latest
    container_name: support_mailpit
    restart: unless-stopped
    profiles:
      - dev
    ports:
      - "${PORT:-8094}:8025"
      - "1025:1025"
    networks:
      - support

  # Caddy — PROD ONLY (auto SSL)
  caddy:
    image: caddy:2-alpine
    container_name: support_caddy
    restart: unless-stopped
    profiles:
      - prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - APP_DOMAIN=${APP_DOMAIN:-localhost}
    networks:
      - support
      - proxy-tier
    depends_on:
      - nginx

networks:
  support:
    driver: bridge
  proxy-tier:
    external: true

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local
